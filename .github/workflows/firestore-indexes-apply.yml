name: Firestore indexes apply

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Plan only"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      project_id:
        description: "Override Firestore project id (optional)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  FIRESTORE_PROJECT_ID: ${{ vars.FIRESTORE_PROJECT_ID }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  DEPLOY_SA_EMAIL: ${{ vars.GCP_DEPLOY_SA }}

jobs:
  firestore-indexes-apply:
    name: firestore-indexes-apply
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Validate required workflow variables
        run: |
          set -euo pipefail
          REQUIRED_VARS=(
            GCP_WIF_PROVIDER
            DEPLOY_SA_EMAIL
          )
          MISSING=0
          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [ -z "${!VAR_NAME}" ]; then
              echo "::error title=Missing workflow variable::${VAR_NAME} is empty"
              MISSING=1
            fi
          done
          if [ -z "${FIRESTORE_PROJECT_ID}" ] && [ -z "${GCP_PROJECT_ID}" ] && [ -z "${{ github.event.inputs.project_id }}" ]; then
            echo "::error title=Missing workflow variable::project_id input or FIRESTORE_PROJECT_ID/GCP_PROJECT_ID must be set"
            MISSING=1
          fi
          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

      - name: Resolve target project id
        run: |
          set -euo pipefail
          TARGET_PROJECT_ID="${{ github.event.inputs.project_id }}"
          if [ -z "$TARGET_PROJECT_ID" ]; then
            TARGET_PROJECT_ID="${FIRESTORE_PROJECT_ID:-$GCP_PROJECT_ID}"
          fi
          if [ -z "$TARGET_PROJECT_ID" ]; then
            echo "::error title=Project resolution failed::Unable to resolve target project id"
            exit 1
          fi
          echo "TARGET_PROJECT_ID=$TARGET_PROJECT_ID" >> "$GITHUB_ENV"

      - name: Auth (OIDC)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA_EMAIL }}
          token_format: access_token

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Set gcloud project
        run: gcloud config set project "$TARGET_PROJECT_ID"

      - name: Plan missing Firestore composite indexes
        run: npm run firestore-indexes:plan -- --project-id "$TARGET_PROJECT_ID"

      - name: Apply missing Firestore composite indexes
        if: github.event.inputs.dry_run != 'true'
        run: npm run firestore-indexes:apply -- --project-id "$TARGET_PROJECT_ID"

      - name: Verify indexes aligned after apply
        if: github.event.inputs.dry_run != 'true'
        run: npm run firestore-indexes:check -- --project-id "$TARGET_PROJECT_ID"
