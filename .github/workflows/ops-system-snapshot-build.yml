name: Ops system snapshot build

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      firestore_indexes_apply:
        description: "Apply missing Firestore composite indexes instead of running the snapshot job"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      dry_run:
        description: "Run in dry-run mode"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      scan_limit:
        description: "Scan limit"
        required: false
        default: "3000"
        type: string

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  FIRESTORE_PROJECT_ID: ${{ vars.FIRESTORE_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  SERVICE_NAME: ${{ vars.SERVICE_NAME }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  DEPLOY_SA_EMAIL: ${{ vars.GCP_DEPLOY_SA }}
  CITY_PACK_JOB_TOKEN: ${{ secrets.CITY_PACK_JOB_TOKEN }}

permissions:
  contents: read
  id-token: write

jobs:
  ops-system-snapshot:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.firestore_indexes_apply != 'true' }}
    runs-on: ubuntu-latest
    environment: stg
    concurrency:
      group: ops-system-snapshot-build
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Auth (OIDC)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA_EMAIL }}
          token_format: access_token

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve service URL
        id: service_url
        run: |
          set -euo pipefail
          SERVICE_URL="$(gcloud run services describe \"$SERVICE_NAME\" --project \"$GCP_PROJECT_ID\" --region \"$GCP_REGION\" --format='value(status.url)')"
          if [ -z "$SERVICE_URL" ]; then
            echo "::error title=Service URL missing::Unable to resolve Cloud Run service URL"
            exit 1
          fi
          echo "service_url=$SERVICE_URL" >> "$GITHUB_OUTPUT"

      - name: Auth proxy id token
        id: proxy_auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA_EMAIL }}
          token_format: id_token
          id_token_audience: ${{ steps.service_url.outputs.service_url }}
          create_credentials_file: false

      - name: Resolve CITY_PACK_JOB_TOKEN
        run: |
          set -euo pipefail
          if [ -n "${CITY_PACK_JOB_TOKEN:-}" ]; then
            echo "::add-mask::$CITY_PACK_JOB_TOKEN"
            echo "CITY_PACK_JOB_TOKEN=$CITY_PACK_JOB_TOKEN" >> "$GITHUB_ENV"
            exit 0
          fi
          TOKEN="$(gcloud secrets versions access latest --secret=CITY_PACK_JOB_TOKEN --project "$GCP_PROJECT_ID" | tr -d '\r')"
          if [ -z "$TOKEN" ]; then
            echo "::error title=Secret read failed::CITY_PACK_JOB_TOKEN is empty"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "CITY_PACK_JOB_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Invoke ops system snapshot build job
        env:
          PROXY_ID_TOKEN: ${{ steps.proxy_auth.outputs.id_token }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_SCAN_LIMIT: ${{ github.event.inputs.scan_limit }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/ops-system-snapshot-build
          OUT_FILE="artifacts/ops-system-snapshot-build/response.json"

          gcloud run services proxy "$SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --token "$PROXY_ID_TOKEN" \
            --port 18082 >/tmp/ops-system-snapshot-proxy.log 2>&1 &
          PROXY_PID=$!
          trap 'kill "$PROXY_PID" >/dev/null 2>&1 || true' EXIT

          READY=0
          for _ in $(seq 1 40); do
            if curl -sS "http://127.0.0.1:18082/healthz" >/dev/null 2>&1; then
              READY=1
              break
            fi
            sleep 2
          done
          if [ "$READY" -ne 1 ]; then
            echo "::error title=Cloud Run proxy not ready::member service proxy on 127.0.0.1:18082 did not become ready"
            tail -n 80 /tmp/ops-system-snapshot-proxy.log || true
            exit 1
          fi

          DRY_RUN="${INPUT_DRY_RUN:-false}"
          if [ "$DRY_RUN" != "true" ]; then
            DRY_RUN="false"
          fi
          SCAN_LIMIT="${INPUT_SCAN_LIMIT:-3000}"
          BODY="{\"dryRun\":$DRY_RUN,\"scanLimit\":$SCAN_LIMIT,\"targets\":[\"ops_system_snapshot\"]}"

          curl -sS -X POST "http://127.0.0.1:18082/internal/jobs/ops-snapshot-build" \
            -H "content-type: application/json" \
            -H "x-city-pack-job-token: $CITY_PACK_JOB_TOKEN" \
            -d "$BODY" > "$OUT_FILE"

          cat "$OUT_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ops-system-snapshot-build-${{ github.run_id }}
          path: artifacts/ops-system-snapshot-build
          if-no-files-found: warn

  firestore-indexes-apply:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.firestore_indexes_apply == 'true' }}
    runs-on: ubuntu-latest
    environment: stg
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Validate required variables
        run: |
          REQUIRED_VARS=(
            GCP_WIF_PROVIDER
            DEPLOY_SA_EMAIL
          )
          MISSING=0
          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [ -z "${!VAR_NAME}" ]; then
              echo "::error title=Missing workflow variable::${VAR_NAME} is empty"
              MISSING=1
            fi
          done
          if [ -z "${FIRESTORE_PROJECT_ID}" ] && [ -z "${GCP_PROJECT_ID}" ]; then
            echo "::error title=Missing workflow variable::FIRESTORE_PROJECT_ID or GCP_PROJECT_ID must be set"
            MISSING=1
          fi
          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

      - name: Auth (OIDC)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA_EMAIL }}
          token_format: access_token

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.FIRESTORE_PROJECT_ID || env.GCP_PROJECT_ID }}

      - name: Apply missing Firestore composite indexes
        env:
          PROJECT_ID: ${{ env.FIRESTORE_PROJECT_ID || env.GCP_PROJECT_ID }}
        run: |
          node <<'NODE'
          const childProcess = require('child_process');
          const path = require('path');
          const root = process.cwd();
          const projectId = process.env.PROJECT_ID;
          if (!projectId) {
            throw new Error('PROJECT_ID is required');
          }
          const {
            readRequiredPayload,
            isCompositeRequiredIndex,
            listActualIndexes,
            diffIndexes,
            buildCreateCommand
          } = require(path.join(root, 'scripts', 'check_firestore_indexes.js'));

          const payload = readRequiredPayload(path.join(root, 'docs', 'REPO_AUDIT_INPUTS', 'firestore_required_indexes.json'));
          const requiredComposite = payload.indexes.filter(isCompositeRequiredIndex);
          const actual = listActualIndexes(projectId, childProcess.execFileSync);
          const diff = diffIndexes(requiredComposite, actual);

          if (!diff.missing.length) {
            console.log('No missing Firestore composite indexes.');
            process.exit(0);
          }

          console.log(`Applying ${diff.missing.length} missing Firestore composite indexes...`);
          for (const item of diff.missing) {
            const command = buildCreateCommand(projectId, item);
            console.log(command);
            childProcess.execFileSync(command, {
              shell: true,
              stdio: 'inherit'
            });
          }
          NODE

      - name: Verify Firestore composite indexes
        run: npm run firestore-indexes:check -- --project-id "${FIRESTORE_PROJECT_ID:-$GCP_PROJECT_ID}"
