name: Quality Patrol cycle

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  FIRESTORE_PROJECT_ID: ${{ vars.FIRESTORE_PROJECT_ID }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  DEPLOY_SA_EMAIL: ${{ vars.GCP_DEPLOY_SA }}
  LLM_FEATURE_FLAG: ${{ vars.LLM_FEATURE_FLAG }}
  OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
  ENABLE_PAID_ORCHESTRATOR_V2: ${{ vars.ENABLE_PAID_ORCHESTRATOR_V2 }}

permissions:
  contents: read
  id-token: write

jobs:
  quality-patrol:
    runs-on: ubuntu-latest
    environment: stg
    concurrency:
      group: quality-patrol-cycle
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA_EMAIL }}
          token_format: access_token
          create_credentials_file: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.FIRESTORE_PROJECT_ID || env.GCP_PROJECT_ID }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Normalize patrol environment
        run: |
          set -euo pipefail
          PROJECT_ID="${FIRESTORE_PROJECT_ID:-$GCP_PROJECT_ID}"
          if [ -z "$PROJECT_ID" ]; then
            echo "::error title=Missing workflow variable::FIRESTORE_PROJECT_ID or GCP_PROJECT_ID must be set"
            exit 1
          fi
          echo "FIRESTORE_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"
          echo "SERVICE_MODE=member" >> "$GITHUB_ENV"
          echo "ENABLE_V1_OPENAI_RESPONSES=true" >> "$GITHUB_ENV"
          echo "LLM_FEATURE_FLAG=${LLM_FEATURE_FLAG:-true}" >> "$GITHUB_ENV"
          echo "OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}" >> "$GITHUB_ENV"
          echo "ENABLE_PAID_ORCHESTRATOR_V2=${ENABLE_PAID_ORCHESTRATOR_V2:-true}" >> "$GITHUB_ENV"

      - name: Resolve OPENAI_API_KEY
        env:
          GH_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${GH_OPENAI_API_KEY:-}" ]; then
            echo "::add-mask::$GH_OPENAI_API_KEY"
            echo "OPENAI_API_KEY=$GH_OPENAI_API_KEY" >> "$GITHUB_ENV"
            exit 0
          fi
          TOKEN="$(gcloud secrets versions access latest --secret=OPENAI_API_KEY --project "${GCP_PROJECT_ID:-$FIRESTORE_PROJECT_ID}" | tr -d '\r')"
          if [ -z "$TOKEN" ]; then
            echo "::error title=Secret read failed::OPENAI_API_KEY is empty"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "OPENAI_API_KEY=$TOKEN" >> "$GITHUB_ENV"

      - name: Materialize Firebase Admin ADC
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_GHA_CREDS_PATH:-}" ] || [ ! -r "${GOOGLE_GHA_CREDS_PATH:-}" ]; then
            echo "::error title=Missing gha credential file::GOOGLE_GHA_CREDS_PATH is unavailable"
            exit 1
          fi
          ADC_PATH="${HOME}/.config/gcloud/application_default_credentials.json"
          gcloud auth application-default login \
            --impersonate-service-account="$DEPLOY_SA_EMAIL" \
            --quiet
          if [ ! -s "$ADC_PATH" ]; then
            echo "::error title=ADC materialization failed::${ADC_PATH} was not created"
            exit 1
          fi
          ADC_TYPE="$(node -e "const fs=require('fs'); const payload=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(String(payload.type || ''));" "$ADC_PATH")"
          case "$ADC_TYPE" in
            impersonated_service_account|service_account|authorized_user)
              ;;
            *)
              echo "::error title=Unsupported ADC type::type=${ADC_TYPE:-missing}"
              exit 1
              ;;
          esac
          gcloud auth application-default print-access-token >/dev/null
          echo "GOOGLE_APPLICATION_CREDENTIALS=$ADC_PATH" >> "$GITHUB_ENV"
          echo "GOOGLE_GHA_CREDS_PATH=" >> "$GITHUB_ENV"
          echo "CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=" >> "$GITHUB_ENV"
          echo "QUALITY_PATROL_ADC_PATH=$ADC_PATH" >> "$GITHUB_ENV"
          echo "QUALITY_PATROL_ADC_TYPE=$ADC_TYPE" >> "$GITHUB_ENV"
          {
            echo "### Quality Patrol auth materialization"
            echo ""
            echo "- adcPath: $ADC_PATH"
            echo "- adcType: $ADC_TYPE"
            echo "- deployServiceAccount: $DEPLOY_SA_EMAIL"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        run: npm install

      - name: Diagnose Firebase Admin ADC
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('node:fs');
          const admin = require('firebase-admin');

          async function main() {
            const adcPath = process.env.GOOGLE_APPLICATION_CREDENTIALS;
            const projectId = process.env.FIRESTORE_PROJECT_ID;
            if (!adcPath) throw new Error('adc_path_missing');
            if (!projectId) throw new Error('firestore_project_id_missing');
            const payload = JSON.parse(fs.readFileSync(adcPath, 'utf8'));
            admin.initializeApp({ projectId });
            const snap = await admin.firestore().doc('__quality_patrol_adc_probe__/noop').get();
            process.stdout.write(`${JSON.stringify({
              ok: true,
              adcPath,
              adcType: payload.type || null,
              projectId,
              exists: snap.exists
            }, null, 2)}\n`);
          }

          main().catch((error) => {
            process.stderr.write(`${JSON.stringify({
              ok: false,
              code: error && error.code ? error.code : 'firebase_admin_adc_probe_failed',
              message: error && error.message ? error.message : String(error)
            }, null, 2)}\n`);
            process.exit(1);
          });
          NODE

      - name: Run quality patrol cycle
        run: npm run quality-patrol:cycle

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-patrol-cycle-${{ github.run_id }}
          path: /tmp/quality_patrol_cycle_*.json
          if-no-files-found: error
